<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İnce Memed Bütçe Pro</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; padding: 15px; background:#f2f2f2;}
.container { max-width:550px; margin:auto; background:white; padding:15px; border-radius:12px;}
input, button, select { width:100%; padding:8px; margin:4px 0;}
button { background:black; color:white; border:none; border-radius:6px;}
.item { display:flex; justify-content:space-between; padding:6px; border-bottom:1px solid #eee;}
.income { color:green;}
.expense { color:red;}
.saving { color:blue; }
.small { font-size:12px; color:#666;}
</style>
</head>
<body>

<div class="container" id="loginBox">
<h2>Giriş</h2>
<input type="password" id="password" placeholder="Şifre">
<button onclick="login()">Giriş Yap</button>
</div>

<div class="container" id="app" style="display:none;">

<h2>İnce Memed Bütçe Pro</h2>

<label>Tarih</label>
<input type="date" id="date">

<label>Açıklama</label>
<input type="text" id="desc">

<label>Tutar</label>
<input type="number" id="amount">

<label>Tür</label>
<select id="type">
<option value="income">Gelir</option>
<option value="expense">Gider</option>
<option value="saving">Kenara Attım</option>
</select>

<label>Kategori</label>
<select id="category">
<option value="Market">Market</option>
<option value="Fatura">Fatura</option>
<option value="Kira">Kira</option>
<option value="Yakıt">Yakıt</option>
<option value="Diğer">Diğer</option>
</select>

<button onclick="addItem()">Ekle</button>

<hr>

<h3>Özet</h3>
<p>Gelir: <span id="income">0</span></p>
<p>Gider: <span id="expense">0</span></p>
<p>Birikim: <span id="savingTotal">0</span></p>
<h3>Kalan: <span id="balance">0</span></h3>
<p id="smartMessage"></p>

<hr>

<canvas id="chart"></canvas>

<hr>

<h3>Hareketler</h3>
<div id="list"></div>

<button onclick="logout()">Çıkış</button>

</div>

<script>
const correctPassword = "1234";

function login(){
  const pass = document.getElementById("password").value;
  if(pass === correctPassword){
    document.getElementById("loginBox").style.display="none";
    document.getElementById("app").style.display="block";
    setToday();
    loadData();
  } else {
    alert("Şifre yanlış");
  }
}

function logout(){
  document.getElementById("app").style.display="none";
  document.getElementById("loginBox").style.display="block";
}

function setToday(){
  document.getElementById("date").value =
    new Date().toISOString().split("T")[0];
}

function formatMoney(num){
  return num.toLocaleString("tr-TR") + " ₺";
}

function getData(){
  return JSON.parse(localStorage.getItem("budgetPro")) || [];
}

function saveData(data){
  localStorage.setItem("budgetPro", JSON.stringify(data));
}

function clearInputs(){
  setToday();
  document.getElementById("desc").value="";
  document.getElementById("amount").value="";
  document.getElementById("type").value="income";
  document.getElementById("category").value="Market";
}

function addItem(){
  let data = getData();

  let item = {
    id: Date.now(),
    date: document.getElementById("date").value,
    desc: document.getElementById("desc").value,
    amount: parseFloat(document.getElementById("amount").value),
    type: document.getElementById("type").value,
    category: document.getElementById("category").value
  };

  if(!item.desc || !item.amount) return;

  data.push(item);
  saveData(data);
  clearInputs();
  loadData();
}

function deleteItem(id){
  let data = getData().filter(x => x.id !== id);
  saveData(data);
  loadData();
}

function loadData(){
  let data = getData();
  let income=0, expense=0, saving=0;
  let list = document.getElementById("list");
  list.innerHTML="";

  let lastExpenseDate=null;

  data.forEach(item=>{
    if(item.type==="income") income+=item.amount;
    if(item.type==="expense"){
      expense+=item.amount;
      lastExpenseDate=item.date;
    }
    if(item.type==="saving") saving+=item.amount;

    list.innerHTML += `
      <div class="item ${item.type}">
        <div>
          <strong>${item.desc}</strong>
          <div class="small">${item.date} - ${item.category}</div>
        </div>
        <div>
          ${formatMoney(item.amount)}
          <button onclick="deleteItem(${item.id})">🗑</button>
        </div>
      </div>
    `;
  });

  document.getElementById("income").innerText=formatMoney(income);
  document.getElementById("expense").innerText=formatMoney(expense);
  document.getElementById("savingTotal").innerText=formatMoney(saving);
  document.getElementById("balance").innerText=formatMoney(income-expense-saving);

  smartAnalysis(data,lastExpenseDate);
  drawChart(income, expense);
}

function smartAnalysis(data,lastExpenseDate){
  let msg="";
  if(lastExpenseDate){
    let diff=(new Date()-new Date(lastExpenseDate))/(1000*60*60*24);
    if(diff>=3) msg="👏 3 gündür harcama yapmadın, iyi gidiyorsun!";
  }

  let marketTotal = data.filter(x=>x.category==="Market" && x.type==="expense")
    .reduce((a,b)=>a+b.amount,0);

  if(marketTotal>0) msg+=" En çok Market harcaması yaptın.";

  document.getElementById("smartMessage").innerText=msg;
}

let chart;
function drawChart(income, expense){
  let ctx=document.getElementById("chart");
  if(chart) chart.destroy();
  chart=new Chart(ctx,{
    type:'bar',
    data:{
      labels:["Gelir","Gider"],
      datasets:[{
        label:"Aylık",
        data:[income,expense]
      }]
    }
  });
}

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
