
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İnce Memed Bütçe</title>
<style>
body { font-family: Arial; padding: 20px; background:#f4f4f4;}
.container { max-width:400px; margin:auto; background:white; padding:20px; border-radius:10px;}
input, button, select { width:100%; padding:10px; margin:5px 0;}
button { background:black; color:white; border:none;}
.list { margin-top:15px;}
.item { display:flex; justify-content:space-between; margin:5px 0;}
.income { color:green;}
.expense { color:red;}
</style>
</head>
<body>

<div class="container" id="loginBox">
<h2>Giriş</h2>
<input type="password" id="password" placeholder="Şifre">
<button onclick="login()">Giriş Yap</button>
</div>

<div class="container" id="app" style="display:none;">
<h2>İnce Memed Bütçe</h2>

<input type="text" id="desc" placeholder="Açıklama">
<input type="number" id="amount" placeholder="Tutar">
<select id="type">
<option value="income">Gelir</option>
<option value="expense">Gider</option>
</select>
<button onclick="addItem()">Ekle</button>

<h3>Toplam: <span id="total">0</span> ₺</h3>

<div class="list" id="list"></div>

<button onclick="logout()">Çıkış</button>
</div>

<script>
const correctPassword = "1234";

function login(){
  const pass = document.getElementById("password").value;
  if(pass === correctPassword){
    document.getElementById("loginBox").style.display="none";
    document.getElementById("app").style.display="block";
    loadData();
  } else {
    alert("Şifre yanlış");
  }
}

function logout(){
  document.getElementById("app").style.display="none";
  document.getElementById("loginBox").style.display="block";
}

function addItem(){
  const desc = document.getElementById("desc").value;
  const amount = parseFloat(document.getElementById("amount").value);
  const type = document.getElementById("type").value;

  if(!desc || !amount) return;

  let data = JSON.parse(localStorage.getItem("budget")) || [];
  data.push({desc, amount, type});
  localStorage.setItem("budget", JSON.stringify(data));

  document.getElementById("desc").value="";
  document.getElementById("amount").value="";

  loadData();
}

function loadData(){
  let data = JSON.parse(localStorage.getItem("budget")) || [];
  let list = document.getElementById("list");
  let total = 0;
  list.innerHTML="";

  data.forEach((item,index)=>{
    let div = document.createElement("div");
    div.className="item " + item.type;
    div.innerHTML = `
      <span>${item.desc}</span>
      <span>${item.type==="income" ? "+" : "-"}${item.amount} ₺</span>
    `;
    list.appendChild(div);

    if(item.type==="income"){
      total += item.amount;
    } else {
      total -= item.amount;
    }
  });

  document.getElementById("total").innerText = total;
}
</script>

</body>
</html>
